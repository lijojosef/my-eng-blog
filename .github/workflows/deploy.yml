name: Build and Deploy Blog to Firebase Hosting

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Clone the codebase
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Provision a clean Node 24 environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Step 3: Install firebase-tools globally via npm, then project dependencies via pnpm
      - name: Install Tools and Dependencies
        run: |
          # Install deployment tools globally via native npm
          npm install -g firebase-tools
          
          # Install application dependencies and allow native architecture binaries to pull down
          npm install -g pnpm
          pnpm install --frozen-lockfile

      # Step 4: Statically compile the Markdown blog
      - name: Build Next.js Static Export
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: |
          pnpm run build

      # Step 5: Flush assets straight to Firebase Hosting Edge CDN
      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase deploy --only hosting --token "$FIREBASE_TOKEN"
